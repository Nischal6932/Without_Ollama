services:
  - type: web
    name: smart-farming-ai
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120 --log-level debug --keep-alive 2
    plan: free
    healthCheckPath: /health
    healthCheck:
      path: /health
      timeoutSeconds: 30
      intervalSeconds: 60
      gracePeriodSeconds: 10
    envVars:
      - key: FLASK_DEBUG
        value: false
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: ENVIRONMENT
        value: production
    disk:
      name: smart-farming-disk
      mountPath: /app
      sizeGB: 1
